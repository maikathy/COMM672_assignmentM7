<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout Practice</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <h1>Grid Layout Practice</h1>
   
    <h2>Basic Grid Layout</h2>
    <div class="g1">
        <div class="item i1">1</div>
        <div class="item i2">2</div>
        <div class="item i3">3</div>
        <div class="item i1">4</div>
        <div class="item i2">5</div>
        <div class="item i3">6</div>
        <div class="item i1">7</div>
        <div class="item i2">8</div>
        <div class="item i3">9</div>
    </div>
   
    <h2>Variable Grid Layout with Numbers</h2>
    <div class="g2">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
        <div class="item">9</div>
        <div class="item">10</div>
        <div class="item">11</div>
        <div class="item">12</div>
        <div class="item">13</div>
        <div class="item">14</div>
        <div class="item">15</div>
        <div class="item">16</div>
    </div>

    <h2>Layout with Nested Grids</h2>
    <div class="g3">
        <header>Header</header>
        <aside>Sidebar</aside>
        <main>
            <div class="articles">Articles</div>
            <div class="featured">Featured</div>
        </main>
        <footer>Footer</footer>
    </div>
</body>
</html>
